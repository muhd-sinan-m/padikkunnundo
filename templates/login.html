<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — padikkunnundo.in</title>
  <meta name="description" content="Sign in to padikkunnundo.in — your personal academic companion at Marian College Kuttikkanam.">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <!-- Brand mark -->
    <div class="login-logo-mark" aria-hidden="true">📚</div>

    <h1 class="login-heading">padikkunnundo.in</h1>
    <p class="login-subheading">
      Personal Academic Companion<br>
      <span style="font-size:13px;color:var(--gray-400);">{{ college_name }}</span>
    </p>

    <!-- Error message (Section 5.2 — domain rejection, shown after a failed OAuth) -->
    {% if error %}
    <div class="login-error" role="alert" id="login-error">
      {{ error }}
    </div>
    {% endif %}

    <!-- Google sign-in button (Section 5.1 — Google OAuth only) -->
    <a href="/auth/google/login" class="google-btn" id="google-signin-btn">
      <!-- Google's official G logo (SVG) -->
      <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.826.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>

    <!-- Domain restriction notice (Section 8.3 / 5.2) -->
    <p class="login-domain-note">
      Only <strong>@{{ college_domain }}</strong> accounts are accepted.<br>
      Personal Gmail addresses will be rejected.
    </p>

  </div>
</div>

</body>
</html>
